<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillow Housing Access</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(139, 92, 246, 0.18), transparent 35%),
                radial-gradient(circle at bottom left, rgba(76, 29, 149, 0.22), transparent 35%),
                #050505;
            color: #ffffff;
        }

        .card {
            width: 100%;
            max-width: 440px;
            padding: 32px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(17, 17, 17, 0.92);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        .eyebrow {
            margin: 0 0 12px;
            color: #bfa0ff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 40px;
            line-height: 1;
        }

        p {
            margin: 0 0 24px;
            color: rgba(255, 255, 255, 0.72);
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.9);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.18);
        }

        button {
            width: 100%;
            margin-top: 18px;
            height: 54px;
            border: 0;
            border-radius: 999px;
            background: #7c3aed;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #8b5cf6;
        }

        .errorlist,
        .messages {
            list-style: none;
            margin: 0 0 18px;
            padding: 0;
        }

        .messages li {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(239, 68, 68, 0.14);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fecaca;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Private Access</p>
        <h1>Pillow Housing</h1>
        <p>Enter the shared team password to access the MVP. The public signup flow remains available separately.</p>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next_url }}">
            <label for="password">Site password</label>
            <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
            >
            <button type="submit">Enter MVP</button>
        </form>
    </main>
</body>
</html>
